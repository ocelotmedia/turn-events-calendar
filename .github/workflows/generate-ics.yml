name: Generate ICS Calendar Feed
on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate events.ics
        run: node generate-ics.js
        env:
          AIRTABLE_TOKEN: "${{ secrets.AIRTABLE_TOKEN }}"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.ics
          git diff --staged --quiet || git commit -m "Update events.ics [skip ci]"
          git push
